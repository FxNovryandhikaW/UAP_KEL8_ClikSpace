<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Daftar - ClickSpace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">ClickSpace</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="layanan.html">Layanan</a>
    <a href="booking.html">Booking</a>
    <a href="register.html">Riwayat</a>
    <a href="register.html" class="btn-login">Register</a>
  </nav>
</header>

<main>
  <section class="page-hero">
    <h1>Daftar Akun</h1>
    <p>Buat akun terlebih dahulu agar bisa melanjutkan ke proses login dan booking.</p>
  </section>

  <section class="section">
    <div class="form-box">
      <form action="login.html">
        <label>Nama Lengkap</label>
        <input type="text" placeholder="Masukkan nama lengkap" required>

        <label>Email</label>
        <input type="email" placeholder="Masukkan email" required>

        <label>No WhatsApp</label>
        <input type="text" placeholder="Masukkan nomor WhatsApp" required>

        <label>Password</label>
        <input type="password" placeholder="Masukkan password" required>

        <label>Konfirmasi Password</label>
        <input type="password" placeholder="Ulangi password" required>

        <button type="submit" class="button full">Daftar</button>
      </form>

      <p class="small-text">
        Sudah punya akun? <a href="login.html">Login di sini</a>
      </p>
    </div>
  </section>
</main>

<footer>
  <p>© 2026 ClickSpace</p>
</footer>

</body>
</html>
