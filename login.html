<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login - ClickSpace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<header>
  <div class="logo">ClickSpace</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="layanan.html">Layanan</a>
    <a href="booking.html">Booking</a>
    <a href="register.html">Riwayat</a>
    <a href="register.html" class="btn-login">Register</a>
  </nav>
</header>

<main>
  <section class="login-layout">
    <div class="page-hero">
      <h1>Login Akun</h1>
      <p>Login setelah register agar kamu bisa masuk ke halaman booking studio.</p>
    </div>

  <section class="section">
    
    <div class="form-box">
      <form action="home-login.html">
        <label>Email</label>
        <input type="email" placeholder="Masukkan email yang sudah didaftarkan" required>

        <label>Password</label>
        <input type="password" placeholder="Masukkan password" required>

        <button type="submit" class="button full">Login</button>
      </form>

      <p class="small-text">
        Belum punya akun? <a href="register.html">Daftar dulu di sini</a>
      </p>
    </div>
  </section>
</main>

<footer>
  <p>© 2026 ClickSpace</p>
</footer>

</body>
</html>
